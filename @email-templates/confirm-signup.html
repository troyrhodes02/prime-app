<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your P.R.I.M.E. verification code</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    body { margin: 0; padding: 0; width: 100% !important; }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #F9FAFB; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

  <!-- Wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #F9FAFB;">
    <tr>
      <td align="center" style="padding: 48px 16px;">

        <!-- Card -->
        <table role="presentation" width="448" cellpadding="0" cellspacing="0" style="max-width: 448px; width: 100%; background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding: 40px 40px 0 40px;">
              <span style="font-size: 20px; font-weight: 600; letter-spacing: -0.025em; color: #111827;">P.R.I.M.E.</span>
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td align="center" style="padding: 24px 40px 0 40px;">
              <h1 style="margin: 0; font-size: 20px; font-weight: 600; color: #111827; line-height: 1.4;">Your verification code</h1>
            </td>
          </tr>

          <!-- Subtext -->
          <tr>
            <td align="center" style="padding: 8px 40px 0 40px;">
              <p style="margin: 0; font-size: 14px; color: #6B7280; line-height: 1.5;">Enter this code to sign in to your financial workspace.</p>
            </td>
          </tr>

          <!-- OTP Code -->
          <tr>
            <td align="center" style="padding: 32px 40px;">
              <div style="display: inline-block; padding: 16px 32px; background-color: #F3F4F6; border-radius: 8px;">
                <span style="font-size: 32px; font-weight: 600; letter-spacing: 0.15em; color: #111827; font-family: 'Courier New', Courier, monospace;">{{ .Token }}</span>
              </div>
            </td>
          </tr>

          <!-- Expiry note -->
          <tr>
            <td align="center" style="padding: 0 40px;">
              <p style="margin: 0; font-size: 13px; color: #9CA3AF; line-height: 1.5;">This code expires in 10 minutes.</p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 32px 40px 0 40px;">
              <div style="border-top: 1px solid #F3F4F6;"></div>
            </td>
          </tr>

          <!-- Magic link fallback -->
          <tr>
            <td align="center" style="padding: 24px 40px;">
              <p style="margin: 0 0 16px 0; font-size: 13px; color: #9CA3AF; line-height: 1.5;">Or sign in directly with this link:</p>
              <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 10px 24px; background-color: #2563EB; color: #FFFFFF; font-size: 14px; font-weight: 500; text-decoration: none; border-radius: 8px; line-height: 1.4;">Sign in to P.R.I.M.E.</a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding: 0 40px 40px 40px;">
              <p style="margin: 0; font-size: 12px; color: #D1D5DB; line-height: 1.5;">If you didn't request this code, you can safely ignore this email.</p>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>
  <!-- /Wrapper -->

</body>
</html>
